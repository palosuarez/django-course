<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ course.name }} - Detalles del Curso</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary-color: #0d6efd;
        --secondary-color: #6c757d;
        --success-color: #198754;
        --danger-color: #dc3545;
      }

      body {
        background-color: #f8f9fa;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        line-height: 1.6;
      }

      .course-header {
        background: linear-gradient(
          135deg,
          var(--primary-color) 0%,
          #0956ca 100%
        );
        color: white;
        padding: 3rem 0;
        margin-bottom: 2rem;
      }

      .course-header h1 {
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 1rem;
      }

      .course-header p {
        font-size: 1.1rem;
        opacity: 0.95;
        margin: 0;
      }

      .lesson-card {
        background: white;
        border: 0.5px solid #e0e0e0;
        border-radius: 0.5rem;
        margin-bottom: 2rem;
        padding: 1.5rem;
      }

      .lesson-title {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 1rem;
        color: var(--primary-color);
      }

      .question-card {
        background: #ffffff;
        border: 1px solid #e9ecef;
        border-radius: 0.5rem;
        padding: 1.25rem;
        margin: 1rem 0;
      }

      .question-content {
        font-size: 1.1rem;
        font-weight: 500;
        margin-bottom: 1rem;
        color: #212529;
      }

      .choice-wrapper {
        display: flex;
        align-items: center;
        padding: 0.75rem;
        margin: 0.5rem 0;
        background: #f8f9fa;
        border-radius: 0.375rem;
        transition: background-color 0.2s;
      }

      .choice-wrapper:hover {
        background: #e9ecef;
      }

      .choice-wrapper input[type='checkbox'] {
        margin-right: 0.75rem;
        cursor: pointer;
        width: 18px;
        height: 18px;
        accent-color: var(--primary-color);
      }

      .choice-wrapper label {
        margin: 0;
        cursor: pointer;
        flex: 1;
        color: #495057;
      }

      .submit-btn {
        background-color: var(--primary-color);
        color: white;
        border: none;
        padding: 0.75rem 2rem;
        font-size: 1rem;
        font-weight: 600;
        border-radius: 0.5rem;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: 2rem;
      }

      .submit-btn:hover {
        background-color: #0956ca;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(13, 110, 253, 0.2);
      }

      .submit-btn:active {
        transform: translateY(0);
      }

      .container-lg {
        max-width: 900px;
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <div class="course-header">
      <div class="container-lg">
        <h1>{{ course.name }}</h1>
        <p>{{ course.description }}</p>
      </div>
    </div>

    <!-- Main Content -->
    <div class="container-lg">
      <!-- Form Envío -->
      <form method="POST" action="{% url 'submit' course.id %}">
        {% csrf_token %}

        <!-- Lecciones y Preguntas -->
        {% for lesson in course.lesson_set.all %}
        <div class="lesson-card">
          <h2 class="lesson-title">{{ lesson.title }}</h2>
          <p class="text-muted">{{ lesson.content }}</p>

          <!-- Preguntas -->
          {% for question in lesson.question_set.all %}
          <div class="question-card">
            <div class="question-content">{{ question.content }}</div>

            <!-- Opciones -->
            <div class="choice-group">
              {% for choice in question.choice_set.all %}
              <div class="choice-wrapper">
                <input
                  type="checkbox"
                  name="choices"
                  value="{{ choice.id }}"
                  id="choice_{{ choice.id }}"
                />
                <label for="choice_{{ choice.id }}">
                  {{ choice.content }}
                </label>
              </div>
              {% endfor %}
            </div>
          </div>
          {% endfor %}
        </div>
        {% endfor %}

        <!-- Submit Button -->
        <div class="text-center">
          <button type="submit" class="submit-btn">Enviar Examen</button>
        </div>
      </form>
    </div>

    <!-- Bootstrap JS (opcional para tooltips, etc.) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
